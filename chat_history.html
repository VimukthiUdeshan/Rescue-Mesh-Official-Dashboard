<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="icon.png"/>
  <title>Reply History - Rescue Mesh</title>
  

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
      background: #f4f7fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      margin: 0;
    }

    h2 {
      font-weight: 900;
      font-size: 2.3rem;
      color: #2575fc;
      margin-bottom: 0;
    }

    .chat-wrapper {
      max-width: 1100px;
      margin: 24px auto;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .chat-header {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: white;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .chat-header-title small {
      display: block;
      margin-top: 4px;
      opacity: 0.95;
      font-size: 0.95rem;
    }

    .chat-actions .btn {
      margin-left: 8px;
      margin-top: 6px;
    }

    .meta-card {
      background: #fff;
      padding: 16px;
      border-bottom: 1px solid #e5eaf3;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .meta-item {
      background: #f8fbff;
      border: 1px solid #e6eefc;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.92rem;
    }

    .meta-item b {
      color: #2575fc;
    }

    .chat-body {
      background: #eef4ff;
      min-height: 72vh;
      max-height: 72vh;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .message-row {
      display: flex;
      margin-bottom: 14px;
    }

    .message-row.left {
      justify-content: flex-start;
    }

    .message-row.right {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 72%;
      padding: 10px 12px 22px 12px;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message-row.left .message-bubble {
      background: #ffffff;
      border-top-left-radius: 4px;
      border-left: 4px solid #6a11cb;
    }

    .message-row.right .message-bubble {
      background: #dcecff;
      border-top-right-radius: 4px;
      border-right: 4px solid #2575fc;
    }

    .sender-name {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sender-user {
      color: #6a11cb;
    }

    .sender-operator {
      color: #2575fc;
    }

    .message-time {
      position: absolute;
      right: 10px;
      bottom: 4px;
      font-size: 0.72rem;
      color: #667781;
    }

    .badge-soft {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .critical { background: #f8d7da; color: #842029; }
    .high { background: #fff3cd; color: #856404; }
    .moderate { background: #cff4fc; color: #055160; }
    .low { background: #d1e7dd; color: #0f5132; }
    .unknown { background: #e2e3e5; color: #41464b; }

    .empty-state,
    .loading-state {
      text-align: center;
      color: #666;
      margin-top: 60px;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .chat-wrapper {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
      }

      .chat-body {
        min-height: calc(100vh - 250px);
        max-height: calc(100vh - 250px);
      }

      .message-bubble {
        max-width: 88%;
      }

      .chat-actions .btn {
        margin-left: 0;
        margin-right: 8px;
      }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="chat-header-title">
      <h2><i class="bi bi-clock-history me-2"></i>Reply History</h2>
      <small id="chatSubTitle">Loading conversation...</small>
    </div>

    <div class="chat-actions">
      <a href="reply_center.html" class="btn btn-light btn-sm">← Reply Center</a>
      <a href="index.html" class="btn btn-outline-light btn-sm">Dashboard</a>
    </div>
  </div>

  <div class="meta-card">
    <div class="meta-grid">
      <div class="meta-item"><b>Node Key:</b> <span id="metaDevice">-</span></div>
      <div class="meta-item"><b>Members:</b> <span id="metaMembers">-</span></div>
      <div class="meta-item"><b>Status:</b> <span id="metaStatus">-</span></div>
      <div class="meta-item"><b>Handled:</b> <span id="metaHandled">-</span></div>
      <div class="meta-item"><b>Location:</b> <span id="metaLocation">-</span></div>
      <div class="meta-item"><b>Severity:</b> <span id="metaSeverity">-</span></div>
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="loading-state">Loading messages...</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    collection,
    query,
    where,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzrKD4IjHiaYvpn5jgr5JcbFNyssX6aUU",
    authDomain: "floodrescue-f062a.firebaseapp.com",
    projectId: "floodrescue-f062a",
    storageBucket: "floodrescue-f062a.firebasestorage.app",
    messagingSenderId: "143056819050",
    appId: "1:143056819050:web:ac7be693be8306d41ecb13"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const sosId = params.get("sosId");
  const messageId = params.get("messageId");
  const nodeKeyParam = params.get("nodeKey");

  const chatBody = document.getElementById("chatBody");
  const chatSubTitle = document.getElementById("chatSubTitle");

  function escapeHtml(text) {
    if (text === null || text === undefined) return "";
    return String(text)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function formatTime(timestamp) {
    if (!timestamp || !timestamp.toDate) return "";
    return timestamp.toDate().toLocaleString();
  }

  function getSeverityClass(severity) {
    const val = (severity || "Unknown").toLowerCase();
    if (val === "critical") return "critical";
    if (val === "high") return "high";
    if (val === "moderate") return "moderate";
    if (val === "low") return "low";
    return "unknown";
  }

  function renderMeta(sos) {
    document.getElementById("metaDevice").textContent = sos.node_key || "-";
    document.getElementById("metaMembers").textContent = sos.familyMembers ?? "-";
    document.getElementById("metaStatus").textContent = sos.status || "-";
    document.getElementById("metaHandled").textContent = sos.handled ? "Yes" : "No";
    document.getElementById("metaLocation").textContent =
      (sos.latitude != null && sos.longitude != null)
        ? `${Number(sos.latitude).toFixed(4)}, ${Number(sos.longitude).toFixed(4)}`
        : "-";

    document.getElementById("metaSeverity").innerHTML =
      `<span class="badge-soft ${getSeverityClass(sos.severity)}">${escapeHtml(sos.severity || "Unknown")}</span>`;
  }

  function createMessageBubble(side, senderName, senderClass, text, timeText) {
    return `
      <div class="message-row ${side}">
        <div class="message-bubble">
          <div class="sender-name ${senderClass}">${escapeHtml(senderName)}</div>
          <div>${escapeHtml(text)}</div>
          <div class="message-time">${escapeHtml(timeText)}</div>
        </div>
      </div>
    `;
  }

  async function loadSOSAndReplies() {
    if (!sosId || !messageId) {
      chatBody.innerHTML = `<div class="empty-state">Missing sosId or messageId in URL.</div>`;
      chatSubTitle.textContent = "Conversation unavailable";
      return;
    }

    try {
      const sosRef = doc(db, "C1", sosId);
      const sosSnap = await getDoc(sosRef);

      if (!sosSnap.exists()) {
        chatBody.innerHTML = `<div class="empty-state">SOS record not found.</div>`;
        chatSubTitle.textContent = "Conversation unavailable";
        return;
      }

      const sosData = sosSnap.data();
      const currentNodeKey = nodeKeyParam || sosData.node_key || "-";

      renderMeta(sosData);
      chatSubTitle.textContent = `Conversation with ${currentNodeKey}`;

      const originalText = sosData.message || sosData.summary || "SOS message";
      const originalTime = formatTime(sosData.timestamp);

      const replyQuery = query(
        collection(db, "responses"),
        where("messageId", "==", messageId)
      );

      onSnapshot(
        replyQuery,
        (snapshot) => {
          let html = "";

          html += createMessageBubble(
            "left",
            `${currentNodeKey} (Sender)`,
            "sender-user",
            originalText,
            originalTime
          );

          let replies = [];
          snapshot.forEach((docSnap) => {
            replies.push(docSnap.data());
          });

          replies.sort((a, b) => {
            const ta = a.timestamp?.seconds || 0;
            const tb = b.timestamp?.seconds || 0;
            return ta - tb;
          });

          replies.forEach((reply) => {
            html += createMessageBubble(
              "right",
              reply.sentBy || "Operator",
              "sender-operator",
              reply.replyText || "",
              formatTime(reply.timestamp)
            );
          });

          chatBody.innerHTML = html;
          chatBody.scrollTop = chatBody.scrollHeight;
        },
        (error) => {
          console.error("Reply listener error:", error);
          chatBody.innerHTML = `<div class="empty-state">Failed to load replies. Check console.</div>`;
        }
      );
    } catch (error) {
      console.error("Error loading chat history:", error);
      chatBody.innerHTML = `<div class="empty-state">Failed to load conversation.</div>`;
      chatSubTitle.textContent = "Error loading chat";
    }
  }

  loadSOSAndReplies();
</script>
</body>
</html>
